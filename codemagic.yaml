workflows:
  ios_preview:
    name: iOS Preview Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      vars:
        CM_BUILD_DIR: .
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: chore/ios-setup
          include: true
          source: true
    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get
      - name: Run tests
        script: |
          flutter test
      - name: Build Android debug
        script: |
          flutter build apk --debug
      - name: Build iOS preview without signing
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/ios/iphoneos/*.app

  ios_signed_release:
    name: iOS Signed IPA
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: fenix-pole-dance-app-store-connect
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.fenixpoledance.appPoleFenix
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        CM_BUILD_DIR: .
    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Flutter pub get
        script: |
          flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log